# Arista cEOS NETCONF Agent 操作ポリシー
# このファイルを編集することで AI が操作できる範囲を制限できます。
# サーバ再起動なしに変更が反映されます（起動時に読み込み）。

# ── インターフェース制限 ────────────────────────────────────────────────────────
# 操作を許可するインターフェース一覧（空リスト = 全許可）
allowed_interfaces: []

# ── VLAN ID 制限 ───────────────────────────────────────────────────────────────
# VLAN 1〜99 は変更不可（システム予約・管理用）
# VLAN 100〜4094 のみ許可
# 空リスト = 全許可。明示した ID のみ許可する場合はリストアップする。
allowed_vlan_ids:
  - 100
  - 101
  - 102
  - 103
  - 104
  - 105
  - 106
  - 107
  - 108
  - 109
  - 110
# ↑ 必要な VLAN ID を追加してください。VLAN 1〜99 は意図的に除外しています。

# ── BGP 保護 ───────────────────────────────────────────────────────────────────
# Local AS 65001 および確立済み BGP セッション（AS 65002）を保護する。
# これらのキーワードが XML に含まれる場合、即ブロックまたは強制 dry-run になります。

# XML 内に含まれると即ブロックするキーワード
forbidden_keywords:
  - delete-config
  - kill-session
  - restart
  - format
  # BGP Local AS 65001 の変更を禁止
  # <autonomous-system>65001</autonomous-system> が XML に現れたらブロック
  #  - ">65001<"
  # BGP neighbor 10.0.20.150（AS 65002）の削除を禁止
  #  - ">10.0.20.150<"

# ── 高リスク操作（強制 dry-run） ───────────────────────────────────────────────
# check_high_risk() が検出するパターン（コードで定義済み）に加え、
# 以下は yaml コメントとして運用上のルールを明示する。
#
# 【強制 dry-run になる操作（HIGH_RISK_PATTERNS）】
#   - <peer-as>       : BGP neighbor の AS 番号変更
#   - <autonomous-system> : Local AS 番号変更（= AS 65001 の変更）
#   - Management0     : 管理インターフェース変更
#
# これらは deploy=True で送信しても、サーバ側で deploy=False に格下げされ
# 承認フローが必要になります。

# ── バルク操作制限 ─────────────────────────────────────────────────────────────
# 1回の実行で許可する最大 VLAN 操作数（0 = 無制限）
max_vlan_operations_per_run: 20
